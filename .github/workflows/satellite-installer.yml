name: Satellite installer

on:
  workflow_dispatch:
  push:
    tags:
      - "satellite-v*"

env:
  CI: true

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: apps/echo-satellite/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable

      - name: Install satellite frontend dependencies
        working-directory: apps/echo-satellite
        run: pnpm install --frozen-lockfile

      - name: Build Echo Satellite (Windows)
        working-directory: apps/echo-satellite
        env:
          CI: true
        run: pnpm tauri:build:win

      - name: Verify Windows installer
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path apps/echo-satellite/src-tauri/target/release/bundle -Recurse -Filter "*-setup.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $exe) {
            Get-ChildItem -Recurse apps/echo-satellite/src-tauri/target/release/bundle -ErrorAction SilentlyContinue
            throw "No Windows satellite installer (*-setup.exe) found"
          }
          Write-Host "Installer ready: $($exe.FullName)"

      - name: Publish GitHub Release (Windows)
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = node -p "require('./apps/echo-satellite/package.json').version"
          if ("${{ github.ref }}" -like "refs/tags/*") {
            $tag = "${{ github.ref }}".Replace("refs/tags/", "")
          } else {
            $tag = "satellite-v$version"
          }
          $assets = Get-ChildItem -Path apps/echo-satellite/src-tauri/target/release/bundle -Recurse -Include *-setup.exe,*.exe.sig | Where-Object { $_.Name -notmatch '\.zip$' } | ForEach-Object { $_.FullName }
          if ($assets.Count -eq 0) { throw "No Windows release assets found" }
          $notesFile = New-TemporaryFile
          node --input-type=module -e "import { satelliteReleaseNotes } from './scripts/satellite-release-notes.mjs'; console.log(satelliteReleaseNotes('$version'))" | Set-Content -Path $notesFile -Encoding utf8
          Write-Host "Publishing $($assets.Count) asset(s) to release $tag"
          if (gh release view $tag 2>$null) {
            foreach ($asset in $assets) {
              gh release upload $tag $asset --clobber
            }
            gh release edit $tag --notes-file $notesFile
          } else {
            gh release create $tag --title "Echo Satellite $version" --notes-file $notesFile -- $assets
          }

  build-macos:
    runs-on: macos-latest
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: apps/echo-satellite/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable

      - name: Install satellite frontend dependencies
        working-directory: apps/echo-satellite
        run: pnpm install --frozen-lockfile

      - name: Build Echo Satellite (macOS)
        working-directory: apps/echo-satellite
        env:
          CI: true
        run: pnpm tauri:build:mac

      - name: Smoke test macOS app launch
        run: |
          set -euo pipefail
          APP="$(find apps/echo-satellite/src-tauri/target/release/bundle/macos -name 'Echo-Satellite.app' | head -1)"
          if [ -z "$APP" ]; then
            echo "Echo-Satellite.app not found"
            find apps/echo-satellite/src-tauri/target/release/bundle -maxdepth 4 -type d
            exit 1
          fi
          BIN="$APP/Contents/MacOS/Echo-Satellite"
          echo "Smoke test: launching $BIN"
          "$BIN" &
          PID=$!
          sleep 4
          if ! kill -0 "$PID" 2>/dev/null; then
            echo "FAIL: Echo Satellite exited within 4s (likely startup crash)"
            LOG="$HOME/Library/Logs/Echo-Satellite/startup.log"
            if [ -f "$LOG" ]; then
              echo "--- startup.log ---"
              cat "$LOG"
            fi
            exit 1
          fi
          kill "$PID" 2>/dev/null || true
          wait "$PID" 2>/dev/null || true
          echo "PASS: Echo Satellite stayed running for 4s"

      - name: Build macOS PKG installer
        run: bash scripts/build-satellite-mac-installers.sh

      - name: Verify macOS installers
        run: |
          version="$(node -p "require('./apps/echo-satellite/package.json').version")"
          pkg="apps/echo-satellite/src-tauri/target/release/bundle/macos/Echo-Satellite_${version}_aarch64.pkg"
          dmg="apps/echo-satellite/src-tauri/target/release/bundle/dmg/Echo-Satellite_${version}_aarch64.dmg"
          test -f "$pkg" || (echo "Missing PKG: $pkg" && exit 1)
          test -f "$dmg" || (echo "Missing DMG: $dmg" && exit 1)
          echo "PKG ready: $pkg"
          echo "DMG ready: $dmg"

      - name: Publish GitHub Release (macOS)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="$(node -p "require('./apps/echo-satellite/package.json').version")"
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tag="${GITHUB_REF#refs/tags/}"
          else
            tag="satellite-v${version}"
          fi
          assets=()
          while IFS= read -r file; do
            assets+=("$file")
          done < <(find apps/echo-satellite/src-tauri/target/release/bundle/macos apps/echo-satellite/src-tauri/target/release/bundle/dmg -type f \( -name '*.dmg' -o -name '*.pkg' -o -name '*.dmg.sig' \))
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No macOS satellite assets found"
            exit 1
          fi
          notes_file="$(mktemp)"
          node --input-type=module -e "import { satelliteReleaseNotes } from './scripts/satellite-release-notes.mjs'; console.log(satelliteReleaseNotes('${version}'))" > "$notes_file"
          echo "Publishing ${#assets[@]} macOS asset(s) to release ${tag}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "${assets[@]}" --clobber
            gh release edit "$tag" --notes-file "$notes_file"
          else
            gh release create "$tag" "${assets[@]}" \
              --title "Echo Satellite ${version}" \
              --notes-file "$notes_file"
          fi

name: Satellite installer

on:
  workflow_dispatch:
  push:
    tags:
      - "satellite-v*"

env:
  CI: true

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: apps/echo-satellite-electron/pnpm-lock.yaml

      - name: Install Echo Satellite (Electron) dependencies
        working-directory: apps/echo-satellite-electron
        run: pnpm install --frozen-lockfile

      - name: Build Echo Satellite (Windows)
        working-directory: apps/echo-satellite-electron
        env:
          CI: true
        run: pnpm build:win

      - name: Verify Windows installer
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path apps/echo-satellite-electron/release -Recurse -Filter "*-setup.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $exe) {
            Get-ChildItem -Recurse apps/echo-satellite-electron/release -ErrorAction SilentlyContinue
            throw "No Windows satellite installer (*-setup.exe) found"
          }
          Write-Host "Installer ready: $($exe.FullName)"

      - name: Publish GitHub Release (Windows)
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = node -p "require('./apps/echo-satellite-electron/package.json').version"
          if ("${{ github.ref }}" -like "refs/tags/*") {
            $tag = "${{ github.ref }}".Replace("refs/tags/", "")
          } else {
            $tag = "satellite-v$version"
          }
          $assets = Get-ChildItem -Path apps/echo-satellite-electron/release -Recurse -Include *-setup.exe | ForEach-Object { $_.FullName }
          if ($assets.Count -eq 0) { throw "No Windows release assets found" }
          $notesFile = New-TemporaryFile
          node --input-type=module -e "import { satelliteReleaseNotes } from './scripts/satellite-release-notes.mjs'; console.log(satelliteReleaseNotes('$version'))" | Set-Content -Path $notesFile -Encoding utf8
          Write-Host "Publishing $($assets.Count) asset(s) to release $tag"
          if (gh release view $tag 2>$null) {
            foreach ($asset in $assets) {
              gh release upload $tag $asset --clobber
            }
            gh release edit $tag --notes-file $notesFile
          } else {
            gh release create $tag --title "Echo Satellite $version" --notes-file $notesFile -- $assets
          }

  build-macos:
    runs-on: macos-latest
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: apps/echo-satellite-electron/pnpm-lock.yaml

      - name: Import Apple Developer certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: bash scripts/import-apple-signing-cert.sh

      - name: Write App Store Connect API key
        id: apple_api_key
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_API_KEY:-}" ] || [ -z "${APPLE_API_KEY_BASE64:-}" ]; then
            echo "App Store Connect API key not configured — notarization will be skipped."
            echo "configured=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          key_dir="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$key_dir"
          key_path="$key_dir/AuthKey_${APPLE_API_KEY}.p8"
          echo "$APPLE_API_KEY_BASE64" | base64 --decode > "$key_path"
          echo "path=$key_path" >> "$GITHUB_OUTPUT"
          echo "configured=true" >> "$GITHUB_OUTPUT"

      - name: Install Echo Satellite (Electron) dependencies
        working-directory: apps/echo-satellite-electron
        run: pnpm install --frozen-lockfile

      - name: Build Echo Satellite (macOS)
        working-directory: apps/echo-satellite-electron
        env:
          CI: true
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_PATH: ${{ steps.apple_api_key.outputs.path }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: pnpm build:mac

      - name: Smoke test macOS app launch
        run: |
          set -euo pipefail
          APP="$(find apps/echo-satellite-electron/release -name 'Echo-Satellite.app' | head -1)"
          if [ -z "$APP" ]; then
            echo "Echo-Satellite.app not found"
            find apps/echo-satellite-electron/release -maxdepth 4 -type d
            exit 1
          fi
          BIN="$APP/Contents/MacOS/Echo-Satellite"
          echo "Smoke test: launching $BIN"
          "$BIN" --disable-gpu &
          sleep 4
          if pgrep -f "Echo-Satellite" >/dev/null 2>&1; then
            echo "PASS: Echo Satellite stayed running for 4s"
          else
            echo "FAIL: Echo Satellite exited within 4s"
            exit 1
          fi
          pkill -f "Echo-Satellite" 2>/dev/null || true

      - name: Build macOS PKG installer
        env:
          APPLE_INSTALLER_SIGNING_IDENTITY: ${{ secrets.APPLE_INSTALLER_SIGNING_IDENTITY }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_PATH: ${{ steps.apple_api_key.outputs.path }}
        run: bash scripts/build-satellite-mac-installers.sh

      - name: Notarize macOS DMG
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_PATH: ${{ steps.apple_api_key.outputs.path }}
        run: |
          version="$(node -p "require('./apps/echo-satellite-electron/package.json').version")"
          dmg="$(find apps/echo-satellite-electron/release -maxdepth 1 -name "Echo-Satellite_${version}_aarch64.dmg" | head -1)"
          bash scripts/notarize-mac-artifact.sh "$dmg"

      - name: Verify macOS installers
        run: |
          version="$(node -p "require('./apps/echo-satellite-electron/package.json').version")"
          pkg="apps/echo-satellite-electron/release/mac-pkg/Echo-Satellite_${version}_aarch64.pkg"
          dmg="$(find apps/echo-satellite-electron/release -maxdepth 1 -name "Echo-Satellite_${version}_aarch64.dmg" | head -1)"
          test -f "$pkg" || (echo "Missing PKG: $pkg" && exit 1)
          test -f "$dmg" || (echo "Missing DMG: $dmg" && exit 1)
          echo "PKG ready: $pkg"
          echo "DMG ready: $dmg"

      - name: Publish GitHub Release (macOS)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="$(node -p "require('./apps/echo-satellite-electron/package.json').version")"
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tag="${GITHUB_REF#refs/tags/}"
          else
            tag="satellite-v${version}"
          fi
          assets=()
          while IFS= read -r file; do
            assets+=("$file")
          done < <(find apps/echo-satellite-electron/release -type f \( -name '*.dmg' -o -name '*.pkg' \))
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No macOS satellite assets found"
            exit 1
          fi
          notes_file="$(mktemp)"
          node --input-type=module -e "import { satelliteReleaseNotes } from './scripts/satellite-release-notes.mjs'; console.log(satelliteReleaseNotes('${version}'))" > "$notes_file"
          echo "Publishing ${#assets[@]} macOS asset(s) to release ${tag}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "${assets[@]}" --clobber
            gh release edit "$tag" --notes-file "$notes_file"
          else
            gh release create "$tag" "${assets[@]}" \
              --title "Echo Satellite ${version}" \
              --notes-file "$notes_file"
          fi

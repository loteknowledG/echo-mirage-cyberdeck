name: Desktop installer

on:
  workflow_dispatch:
  push:
    tags:
      - "desktop-v*"

env:
  NODE_OPTIONS: --max-old-space-size=7168
  NEXT_TELEMETRY_DISABLED: "1"
  ECHO_MIRAGE_ELECTRON_BUILD: "1"
  CI: true

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 120
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: next-win-${{ hashFiles('pnpm-lock.yaml', 'next.config.mjs', 'src/**') }}
          restore-keys: |
            next-win-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Build Next.js standalone bundle
        env:
          OPENCODE_ZEN_API_KEY: ${{ secrets.OPENCODE_ZEN_API_KEY }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          ZEN_API_KEY: ${{ secrets.ZEN_API_KEY }}
          OPENCODE_GO_API_KEY: ${{ secrets.OPENCODE_GO_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node scripts/prepare-electron-standalone.mjs

      - name: Verify bundled provider env (Windows)
        shell: pwsh
        env:
          OPENCODE_ZEN_API_KEY: ${{ secrets.OPENCODE_ZEN_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          if ($env:OPENCODE_ZEN_API_KEY -or $env:OPENROUTER_API_KEY) {
            if (-not (Test-Path .next/standalone-electron/desktop-provider.env)) {
              throw "Expected desktop-provider.env after prepare (add OPENCODE_ZEN_API_KEY / OPENROUTER_API_KEY repo secrets)"
            }
            Write-Host "desktop-provider.env present for Windows build"
          } else {
            Write-Host "No desktop provider secrets configured — installer will prompt for keys"
          }

      - name: Package Windows installer
        run: pnpm exec electron-builder --win --publish never

      - name: Verify installer artifact
        shell: pwsh
        run: |
          $exe = Get-ChildItem dist-electron/*.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $exe) {
            Get-ChildItem dist-electron -Recurse -ErrorAction SilentlyContinue | Format-Table FullName, Length
            throw "No installer .exe found under dist-electron"
          }
          Write-Host "Installer ready: $($exe.FullName) ($([math]::Round($exe.Length / 1MB, 1)) MB)"

      - name: Publish GitHub Release (Windows)
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = node -p "require('./package.json').version"
          if ($env:GITHUB_REF -like 'refs/tags/*') {
            $tag = $env:GITHUB_REF -replace 'refs/tags/', ''
          } else {
            $tag = "desktop-v$version"
          }
          $exe = Get-ChildItem dist-electron/*.exe | Select-Object -First 1
          if (-not $exe) { throw "No installer .exe found under dist-electron" }
          $assets = @($exe.FullName)
          $latestYml = Join-Path dist-electron "latest.yml"
          if (Test-Path $latestYml) { $assets += $latestYml }
          Get-ChildItem dist-electron -Filter "*.blockmap" -File -ErrorAction SilentlyContinue | ForEach-Object {
            $assets += $_.FullName
          }
          $notesFile = New-TemporaryFile
          node --input-type=module -e "import { desktopReleaseNotes } from './scripts/desktop-release-notes.mjs'; console.log(desktopReleaseNotes('$version'))" | Set-Content -Path $notesFile.FullName -Encoding utf8
          Write-Host "Publishing $($assets.Count) Windows asset(s) to release $tag"
          gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) {
            # Do not mark --latest: Echo Satellite releases own "latest" for Satellite downloads.
            gh release create $tag @assets `
              --title "Echo Mirage Desktop $version" `
              --notes-file $notesFile.FullName
          } else {
            gh release upload $tag @assets --clobber
          }

  build-macos:
    runs-on: macos-latest
    timeout-minutes: 120
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: next-mac-${{ hashFiles('pnpm-lock.yaml', 'next.config.mjs', 'src/**') }}
          restore-keys: |
            next-mac-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Build Next.js standalone bundle
        env:
          OPENCODE_ZEN_API_KEY: ${{ secrets.OPENCODE_ZEN_API_KEY }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          ZEN_API_KEY: ${{ secrets.ZEN_API_KEY }}
          OPENCODE_GO_API_KEY: ${{ secrets.OPENCODE_GO_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node scripts/prepare-electron-standalone.mjs

      - name: Verify bundled provider env (macOS)
        env:
          OPENCODE_ZEN_API_KEY: ${{ secrets.OPENCODE_ZEN_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          if [ -n "${OPENCODE_ZEN_API_KEY}" ] || [ -n "${OPENROUTER_API_KEY}" ]; then
            if [ ! -f .next/standalone-electron/desktop-provider.env ]; then
              echo "Expected desktop-provider.env after prepare (add OPENCODE_ZEN_API_KEY / OPENROUTER_API_KEY repo secrets)"
              exit 1
            fi
            echo "desktop-provider.env present for macOS build"
          else
            echo "No desktop provider secrets configured — installer will prompt for keys"
          fi

      - name: Package macOS DMG
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: pnpm exec electron-builder --mac --publish never

      - name: Verify installer artifact
        run: |
          dmg="$(find dist-electron -maxdepth 1 -name '*.dmg' | head -1)"
          if [ -z "$dmg" ]; then
            ls -la dist-electron || true
            exit 1
          fi
          echo "Installer ready: $dmg"

      - name: Publish GitHub Release (macOS)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="$(node -p "require('./package.json').version")"
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tag="${GITHUB_REF#refs/tags/}"
          else
            tag="desktop-v${version}"
          fi
          assets=()
          while IFS= read -r file; do
            assets+=("$file")
          done < <(find dist-electron -maxdepth 1 \( -name '*.dmg' -o -name 'latest-mac.yml' -o -name '*.dmg.blockmap' \))
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No macOS release assets found under dist-electron"
            exit 1
          fi
          notes_file="$(mktemp)"
          node --input-type=module -e "import { desktopReleaseNotes } from './scripts/desktop-release-notes.mjs'; console.log(desktopReleaseNotes('${version}'))" > "$notes_file"
          echo "Publishing ${#assets[@]} macOS asset(s) to release ${tag}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "${assets[@]}" --clobber
            gh release edit "$tag" --notes-file "$notes_file"
          else
            gh release create "$tag" "${assets[@]}" \
              --title "Echo Mirage Desktop ${version}" \
              --notes-file "$notes_file"
          fi
          rm -f "$notes_file"

name: Desktop installer

on:
  workflow_dispatch:
  push:
    tags:
      - "desktop-v*"

env:
  NODE_OPTIONS: --max-old-space-size=7168
  NEXT_TELEMETRY_DISABLED: "1"
  ECHO_MIRAGE_ELECTRON_BUILD: "1"
  CI: true

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 120
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: next-win-${{ hashFiles('pnpm-lock.yaml', 'next.config.mjs', 'src/**') }}
          restore-keys: |
            next-win-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Build Next.js standalone bundle
        run: node scripts/prepare-electron-standalone.mjs

      - name: Package Windows installer
        run: pnpm exec electron-builder --win

      - name: Verify installer artifact
        shell: pwsh
        run: |
          $exe = Get-ChildItem dist-electron/*.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $exe) {
            Get-ChildItem dist-electron -Recurse -ErrorAction SilentlyContinue | Format-Table FullName, Length
            throw "No installer .exe found under dist-electron"
          }
          Write-Host "Installer ready: $($exe.FullName) ($([math]::Round($exe.Length / 1MB, 1)) MB)"

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = node -p "require('./package.json').version"
          if ($env:GITHUB_REF -like 'refs/tags/*') {
            $tag = $env:GITHUB_REF -replace 'refs/tags/', ''
          } else {
            $tag = "desktop-v$version"
          }
          $exe = Get-ChildItem dist-electron/*.exe | Select-Object -First 1
          if (-not $exe) { throw "No installer .exe found under dist-electron" }
          Write-Host "Publishing $($exe.Name) to release $tag"
          gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag $exe.FullName `
              --title "Echo Mirage Desktop $version" `
              --notes "Windows desktop installer — Silent Mode, system tray, local disk IPC, and full cyberdeck bridges." `
              --latest
          } else {
            gh release upload $tag $exe.FullName --clobber
          }

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>echo-extension</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <h1>echo-extension</h1>
      <p class="tagline">copy · Chrome tab text · via echo-electron</p>
    </header>
    <button id="send" type="button">Send active tab (Phase 0 fallback)</button>
    <p id="status" class="status" role="status" aria-live="polite"></p>
    <p class="hint">
      Phase 1: keep this extension loaded in Chrome. mirage-browser (Zen) lists tabs and captures via
      echo-electron. Phase 0 button still pushes to a same-browser mirage tab if open.
    </p>
    <script type="module" src="popup.js"></script>
  </body>
</html>

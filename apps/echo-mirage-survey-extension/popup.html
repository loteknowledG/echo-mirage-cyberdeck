<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Survey Satellite</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <h1>Survey Satellite</h1>
      <p class="tagline">Echo Mirage · page recon</p>
    </header>
    <button id="send" type="button">Send active tab to Survey</button>
    <p id="status" class="status" role="status" aria-live="polite"></p>
    <p class="hint">
      Open Echo Mirage cyberdeck in another tab. Browse the target page here, then send its text to
      MUTHUR. Reload cyberdeck after updating the extension. For local image files, enable
      &quot;Allow access to file URLs&quot; on the extension in chrome://extensions.
    </p>
    <script type="module" src="popup.js"></script>
  </body>
